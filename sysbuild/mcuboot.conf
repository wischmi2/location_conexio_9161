#
# MCUboot settings for Conexio Stratus Pro.
#

# PM_PARTITION_SIZE_MCUBOOT belongs to the application partition manager,
# not to mcuboot's own Kconfig - removed to avoid "undefined symbol" warning.

# Disable auto-detection so the manual sector count below is accepted.
CONFIG_BOOT_MAX_IMG_SECTORS_AUTO=n
CONFIG_BOOT_MAX_IMG_SECTORS=256

# BOOT_ERASE_PROGRESSIVELY requires MCUBOOT_SERIAL which is not enabled - removed.

# MCUboot only needs UART/flash to accept DFU uploads.
CONFIG_I2C=n
CONFIG_SENSOR=n
CONFIG_REGULATOR=n
CONFIG_NPM13XX_CHARGER=n
CONFIG_MCUBOOT_INDICATION_LED=n
