#
# Golioth LightDB Stream overlay for nRF9151 (thingy91x)
#
# Apply alongside base prj.conf:
#   west build -b thingy91x_nrf9151_ns -- \
#     -DZEPHYR_EXTRA_MODULES=C:/ncs/v3.2.0/modules/lib/golioth-firmware-sdk \
#     -DEXTRA_CONF_FILE=overlay-golioth.conf
#

# Golioth Firmware SDK (enables CoAP client, DTLS, ZCBOR)
CONFIG_GOLIOTH_FIRMWARE_SDK=y

# LightDB Stream API
CONFIG_GOLIOTH_STREAM=y

# Use PSK authentication (credentials hardcoded in main.c)
CONFIG_GOLIOTH_AUTH_METHOD_PSK=y
# Use a fixed, modem-safe sec tag for TLS credentials used by Golioth.
CONFIG_GOLIOTH_COAP_CLIENT_CREDENTIALS_TAG=42

# nRF91 offloaded networking path
CONFIG_NRF_MODEM_LIB_NET_IF=y
CONFIG_NRF_MODEM_LIB_NET_IF_AUTO_START=y
CONFIG_NRF_MODEM_LIB_NET_IF_AUTO_CONNECT=n
CONFIG_MODEM_KEY_MGMT=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=1024

# For nRF91 offloaded DTLS sockets, keep TLS credentials in modem sec tag storage.
CONFIG_TLS_CREDENTIALS_BACKEND_NRF_MODEM=y
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=n

# The current SIM/network reports ESM cause 50 (IPv4 only allowed) when the
# modem asks for dual-stack PDN, so keep the LTE data path IPv4-only.
CONFIG_LTE_LC_PDN_DEFAULTS_OVERRIDE=y
CONFIG_LTE_LC_PDN_DEFAULT_FAM_IPV4=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_IF_MAX_IPV4_COUNT=1
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=2

# Show SDK-side address selection and DTLS setup failures.
CONFIG_GOLIOTH_LOG_LEVEL_DBG=y
CONFIG_NET_LOG=y
CONFIG_NET_SOCKETS_LOG_LEVEL_DBG=y

# Golioth uses eventfd-backed semaphores internally.
CONFIG_ZVFS=y
CONFIG_ZVFS_EVENTFD=y
CONFIG_ZVFS_EVENTFD_MAX=16
CONFIG_ZVFS_OPEN_MAX=25

# Keep TLS settings aligned with Golioth nRF91 reference to avoid invalid
# DTLS option combinations that can surface as connect() EINVAL (-22).
CONFIG_MBEDTLS_KEY_EXCHANGE_DHE_PSK_ENABLED=n
CONFIG_MBEDTLS_KEY_EXCHANGE_DHE_RSA_ENABLED=n
CONFIG_MBEDTLS_PK_PARSE_EC_EXTENDED=n
CONFIG_NORDIC_SECURITY_BACKEND=n
CONFIG_MBEDTLS_LEGACY_CRYPTO_C=y

# Increase system workqueue stack (Golioth runs CoAP retries on it)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Increase heap for modem-offloaded DTLS and CoAP message buffers
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Increase main stack for Golioth client init
CONFIG_MAIN_STACK_SIZE=4096
