#
# Golioth LightDB Stream overlay for nRF9151 (thingy91x)
#
# Apply alongside base prj.conf:
#   west build -b thingy91x_nrf9151_ns -- \
#     -DZEPHYR_EXTRA_MODULES=C:/ncs/v3.2.0/modules/lib/golioth-firmware-sdk \
#     -DEXTRA_CONF_FILE=overlay-golioth.conf
#

# Golioth Firmware SDK (enables CoAP client, DTLS, ZCBOR)
CONFIG_GOLIOTH_FIRMWARE_SDK=y

# LightDB Stream API
CONFIG_GOLIOTH_STREAM=y

# Use PSK authentication (credentials hardcoded in main.c)
CONFIG_GOLIOTH_AUTH_METHOD_PSK=y
# Use a fixed, modem-safe sec tag for TLS credentials used by Golioth.
CONFIG_GOLIOTH_COAP_CLIENT_CREDENTIALS_TAG=42

# nRF91 offloaded networking path
CONFIG_NRF_MODEM_LIB_NET_IF=y
CONFIG_NRF_MODEM_LIB_NET_IF_AUTO_START=y
# Must be off: if the modem attaches LTE before main(), modem_key_mgmt cannot
# write PSK to sec tags ("Not allowed when LTE connection is active").
CONFIG_NRF_MODEM_LIB_NET_IF_AUTO_CONNECT=n
CONFIG_MODEM_KEY_MGMT=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONNECTION_MANAGER_MONITOR_STACK_SIZE=1024

# Native mbedTLS (see NET_SOCKETS_TLS_PRIORITY) reads PSK from Zephyr tls_credential_*.
# The nrf_modem TLS backend only mirrors CA/certs into the credential table, not PSK, so
# Golioth DTLS would fail connect() with errno 2 (ENOENT) for tag 42.
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y

# The current SIM/network reports ESM cause 50 (IPv4 only allowed) when the
# modem asks for dual-stack PDN, so keep the LTE data path IPv4-only.
CONFIG_LTE_LC_PDN_DEFAULTS_OVERRIDE=y
CONFIG_LTE_LC_PDN_DEFAULT_FAM_IPV4=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=y
# Zephyr IP stack: enable IPv6 node without using IPv6 on the PDN (hello_nrf91_offloaded pattern).
# Fully disabling IPv6 has been linked to offloaded DTLS / getaddrinfo issues on some builds.
CONFIG_NET_IPV6=y
CONFIG_NET_IPV6_NBR_CACHE=n
CONFIG_NET_IPV6_MLD=n
CONFIG_NET_IF_MAX_IPV4_COUNT=1
CONFIG_NET_IF_UNICAST_IPV4_ADDR_COUNT=2

# Prefer Zephyr native TLS/DTLS over modem-offloaded TLS (see Zephyr
# NET_SOCKETS_OFFLOAD_PRIORITY vs NET_SOCKETS_TLS_PRIORITY). Modem offload
# returns ENOTSUP (-109) for some DTLS setsockopt paths Golioth uses.
# Matches golioth-firmware-sdk examples/zephyr/hello/socs/nrf9160_ns.conf.
CONFIG_NET_SOCKETS_TLS_PRIORITY=35

# Golioth DBG helps trace CoAP/DTLS; keep socket layer at INF so
# socket_service_thread DEBUG lines do not splice UART output with printk.
CONFIG_GOLIOTH_LOG_LEVEL_DBG=y
CONFIG_NET_LOG=y
CONFIG_NET_SOCKETS_LOG_LEVEL_INF=y

# Golioth uses eventfd-backed semaphores internally.
CONFIG_ZVFS=y
CONFIG_ZVFS_EVENTFD=y
CONFIG_ZVFS_EVENTFD_MAX=16
CONFIG_ZVFS_OPEN_MAX=25

# Keep TLS settings aligned with Golioth nRF91 reference to avoid invalid
# DTLS option combinations that can surface as connect() EINVAL (-22).
CONFIG_MBEDTLS_KEY_EXCHANGE_PSK_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_DHE_PSK_ENABLED=n
CONFIG_MBEDTLS_KEY_EXCHANGE_DHE_RSA_ENABLED=n
CONFIG_MBEDTLS_PK_PARSE_EC_EXTENDED=n
CONFIG_NORDIC_SECURITY_BACKEND=n
CONFIG_MBEDTLS_LEGACY_CRYPTO_C=y
# Match Golioth SDK defaults for NCS+nRF (see port/zephyr/Kconfig GOLIOTH_CIPHERSUITES): GCM first.
# CCM-only was tried earlier for footprint; a fatal server alert (-0x7780 → connect -ECONNABORTED/-113)
# often indicates cipher mismatch — offer GCM and CCM so ClientHello matches cloud negotiation.
CONFIG_GOLIOTH_CIPHERSUITES="TLS_PSK_WITH_AES_128_GCM_SHA256 TLS_PSK_WITH_AES_128_CCM"
CONFIG_MBEDTLS_CIPHER_AES_ENABLED=y
CONFIG_MBEDTLS_CIPHER_CCM_ENABLED=y
CONFIG_MBEDTLS_CIPHER_GCM_ENABLED=y
CONFIG_MBEDTLS_SHA256=y
# mbedtls_ssl_conf_psk fails if key length exceeds this (common Golioth PSK is 32 B).
CONFIG_MBEDTLS_PSK_MAX_LEN=64
# DTLS handshake allocates from mbed heap; too small -> connect() errno 12 (ENOMEM), logged as -12.
# Keep large enough for DTLS but below nRF9160 NS SRAM limit (98304+65536 overflowed RAM ~11 KiB).
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=86016

# k_malloc users (CoAP, net buffers, etc.) — raise with mbed heap so TLS setup does not starve.
CONFIG_HEAP_MEM_POOL_SIZE=57344

# Increase system workqueue stack (Golioth runs CoAP retries on it)
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Leave at Zephyr defaults (-1): Golioth setsockopt runs before mbedtls_ssl_config_defaults()
# and calls mbedtls_ssl_conf_handshake_timeout() on a half-initialized ssl_config, which can
# break the subsequent handshake (connect() errno EINVAL / -22).
CONFIG_GOLIOTH_ZEPHYR_DTLS_HANDSHAKE_TIMEOUT_MIN_MS=-1
CONFIG_GOLIOTH_ZEPHYR_DTLS_HANDSHAKE_TIMEOUT_MAX_MS=-1

# Increase main stack for Golioth client init
CONFIG_MAIN_STACK_SIZE=4096
