# General config
CONFIG_FPU=y
CONFIG_NRF_MODEM_LIB=y

# Heap and stacks
CONFIG_MAIN_STACK_SIZE=2048
# Extended memory heap size needed for encoding REST messages to JSON
CONFIG_HEAP_MEM_POOL_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1536
# Increase AT monitor heap because %NCELLMEAS notifications can be large
CONFIG_AT_MONITOR_HEAP_SIZE=1024

# Location library
CONFIG_LOCATION=y
CONFIG_LOCATION_METHOD_CELLULAR=n
CONFIG_LOCATION_SERVICE_EXTERNAL=y
# The location library enforces an overall request timeout; raise it above
# the GNSS method timeout used by the app.
CONFIG_LOCATION_REQUEST_DEFAULT_TIMEOUT=900000
# Require fewer consecutive GNSS fixes (minimum allowed by this SDK is 2).
CONFIG_LOCATION_REQUEST_DEFAULT_GNSS_NUM_CONSECUTIVE_FIXES=2

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# Network
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# LTE link control
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PSM_MODULE=y
# Enable LTE-M + GPS so the modem GNSS receiver is active (AT%XSYSTEMMODE=1,0,1,0)
CONFIG_LTE_NETWORK_MODE_LTE_M_GPS=y
# Disable PSM requests during GNSS validation so GNSS has longer continuous windows.
CONFIG_LTE_PSM_REQ=n
# Disable eDRX requests as well to minimize GNSS interruption from LTE paging cycles.
CONFIG_LTE_EDRX_REQ=n
# Configuration of the onboard GPS antenna power path (board-specific).
CONFIG_GPS_SAMPLE_ANTENNA_ONBOARD=y
CONFIG_GPS_SAMPLE_AT_COEX0="AT\%XCOEX0=1,1,1565,1586"
CONFIG_GPS_SAMPLE_AT_MAGPIO=""
CONFIG_GPS_SAMPLE_AT_MIPIRFFEDEV="AT\%XMIPIRFFEDEV=1,4,71,198,248"
CONFIG_GPS_SAMPLE_AT_MIPIRFFECTRL_INIT="AT\%XMIPIRFFECTRL=1,0,1,28,248"
CONFIG_GPS_SAMPLE_AT_MIPIRFFECTRL_ON="AT\%XMIPIRFFECTRL=1,1,1,28,56,13,0,0,8,8,715,4,4,770,12,12,829,11,11,863,130,130,892,1,1,939,129,129,978,26,26,1042,8,8,1118,4,4,1270,12,12,1386,14,14,1523,130,130,2200"
# Request periodic TAU of 8 hours
CONFIG_LTE_PSM_REQ_RPTAU="00101000"
# Request PSM active time of 8 seconds.
CONFIG_LTE_PSM_REQ_RAT="00000100"

# AT Host library - Used to send AT commands directy from an UART terminal and to allow
#		    integration with nRF Connect for Desktop LTE Link monitor application.
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_AT_HOST_LIBRARY=y

# Disable nRF Cloud-assisted location for GNSS-only validation.
CONFIG_NRF_CLOUD=n
CONFIG_NRF_CLOUD_REST=n
CONFIG_NRF_CLOUD_AGNSS=n
CONFIG_MODEM_INFO=n
CONFIG_MODEM_INFO_ADD_NETWORK=n

# Library that maintains the current date time UTC for A-GNSS and P-GPS purposes
CONFIG_DATE_TIME=y

# Modem JWT is not needed when nRF Cloud assistance is disabled.
CONFIG_MODEM_JWT=n

# Solar Energy 2 Click on mikroBUS: BLV (PWM), HLV (INT), WUP (AN) — see Kconfig help.
CONFIG_SOLAR_ENERGY_CLICK_MONITOR=y
